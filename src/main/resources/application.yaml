spring:
  application:
    name: easements
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level %logger{30}.%M - %msg%n"
  level:
    com.primefilter:
      service: INFO
      controller:
        MovieController: INFO
    net.ravendb.client.documents.session.operations: WARN
    org.gpc4j.easements.services.GeminiService: INFO
    org.gpc4j.easements.services.OpenAIService: INFO
    org.gpc4j.easements.services.AnthropicService: INFO

server:
  port: 8085

management:
  server:
    port: 8090
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# RavenDB Configuration
ravendb:
  database: DocSearch
#  urls: injected from Jenkins Global properties RAVENDB_URLS

# PaddleOCR service — k8s service endpoint that accepts a PDF and returns EasementDoc JSON.
paddle:
  ocr:
    url: http://laptop.paddleocr-main/api/easement
    callback-url: https://easementservice.mcquarrie.cc/api/easement/import
    timeout-seconds: 120

# PageRefreshTask schedule
page-refresh:
  delay-minutes: 10

