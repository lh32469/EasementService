spring:
  application:
    name: easements
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level %logger{30}.%M - %msg%n"
  level:
    com.primefilter:
      service: INFO
      controller:
        MovieController: INFO
    net.ravendb.client.documents.session.operations: WARN

server:
  port: 8085

management:
  server:
    port: 8090
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# RavenDB Configuration
ravendb:
  database: DocSearch
#  urls: injected from Jenkins Global properties RAVENDB_URLS

# Tesseract OCR — path to the tessdata directory containing eng.traineddata.
# Container (Ubuntu 22.04 + tesseract-ocr apt package): /usr/share/tesseract-ocr/5/tessdata
# macOS MacPorts: /opt/local/share/tessdata
tesseract:
  datapath: /usr/share/tesseract-ocr/5/tessdata
