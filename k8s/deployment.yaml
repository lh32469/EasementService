apiVersion: apps/v1
kind: Deployment
metadata:
  name: easementservice
  labels:
    app: easementservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: easementservice
  template:
    metadata:
      labels:
        app: easementservice
    spec:
      containers:
        - name: easementservice
          image: easementservice:latest
          ports:
            - containerPort: 8085
            - containerPort: 8090
          env:
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
